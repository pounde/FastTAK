# =============================================================================
# FastTAK — Test Override
# =============================================================================
# Remaps host ports so integration tests can run alongside dev and
# CloudTAK stacks without port conflicts. Most use +10000 offset;
# mediamtx uses +20000 to avoid CloudTAK's media-infra ports.
#
# Used internally by tests-integration/test-stack.sh — not invoked directly.
#
# Requires Docker Compose v2.24+ for !override directive.
# =============================================================================

services:
  tak-server:
    ports: !override
      - "18089:8089"
      - "18443:8443"
      - "18446:8446"
    healthcheck:
      test: ["CMD", "/opt/tak/healthcheck.sh"]
      interval: 10s
      retries: 5
      start_period: 60s
    # Reset volumes to drop per-file bind mounts that overlay onto the TAK
    # volume. test-setup.sh copies healthcheck.sh and register-api-cert.sh
    # into TAK_HOST_PATH instead, avoiding Docker Desktop virtiofs conflicts
    # when TAK_HOST_PATH is on /private/tmp.
    volumes: !override
      - ${TAK_HOST_PATH:-./tak}:/opt/tak
      - ./tak-server/start.sh:/start.sh:ro
  caddy:
    ports: !override
      - "10080:80"
      - "10443:443"
  mediamtx:
    ports: !override
      - "28554:8554"
      - "21935:1935"
      - "28888:8888"
  tak-portal:
    ports:
      - "13000:3000"
  nodered:
    ports:
      - "11880:1880"
  monitor:
    ports:
      - "18180:8080"
