# =============================================================================
# FastTAK — Docker Compose Stack
# =============================================================================
# All services start together. No profiles needed.
#   ./start.sh              # or: docker compose up -d --build
#
# Prerequisites:
#   1. Run ./setup.sh <takserver-docker-X.X.zip> to extract tak/ and build images
#   2. cp .env.example .env && vim .env
# =============================================================================

# ---------------------------------------------------------------------------
# Shared fragments (YAML anchors)
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

# TAK host path — defaults to ./tak. Override with TAK_HOST_PATH env var to:
#   - Run integration tests against an isolated copy (avoids collisions with running stack)
#   - Test against different TAK Server versions (e.g., TAK_HOST_PATH=./tak-5.7)
# Any new bind mounts referencing TAK files should use ${TAK_HOST_PATH:-./tak} as the
# base path, not ./tak directly, so the override works consistently.
x-tak-mount: &tak-mount ${TAK_HOST_PATH:-./tak}:/opt/tak

x-authentik-env: &authentik-env
  AUTHENTIK_POSTGRESQL__HOST: pgbouncer
  AUTHENTIK_POSTGRESQL__USER: fastak
  AUTHENTIK_POSTGRESQL__NAME: authentik
  AUTHENTIK_POSTGRESQL__PASSWORD: ${APP_DB_PASSWORD}
  AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS: "true"
  AUTHENTIK_REDIS__HOST: redis
  AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
  AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_ADMIN_PASSWORD}
  AUTHENTIK_BOOTSTRAP_TOKEN: ${AUTHENTIK_API_TOKEN}
  AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_ADMIN_EMAIL:-admin@example.com}

# =============================================================================
# Volumes
# =============================================================================
volumes:
  tak-db-data:
  app-db-data:
  nodered-data:
  caddy-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  default:

# =============================================================================
# Services
# =============================================================================
services:

  # ── TAK Database (official tak.gov image — PostgreSQL 15 + PostGIS) ──────
  tak-database:
    image: takserver-database:${TAK_VERSION}
    entrypoint: ["/start.sh"]
    restart: unless-stopped
    logging: *default-logging
    environment:
      TAK_DB_PASSWORD: ${TAK_DB_PASSWORD}
      PG_AUTOVACUUM_SCALE_FACTOR: ${PG_AUTOVACUUM_SCALE_FACTOR:-}
      PG_AUTOVACUUM_COST_LIMIT: ${PG_AUTOVACUUM_COST_LIMIT:-}
      PG_MAINTENANCE_WORK_MEM: ${PG_MAINTENANCE_WORK_MEM:-}
    volumes:
      - tak-db-data:/var/lib/postgresql/data
      - *tak-mount
      - ./tak-database/start.sh:/start.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "martiuser", "-d", "cot"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── Init: config (one-shot config patching) ────────────────────────────
  init-config:
    build: ./init-config
    restart: "no"
    logging: *default-logging
    depends_on:
      tak-database:
        condition: service_healthy
    environment:
      TAK_DB_PASSWORD: ${TAK_DB_PASSWORD}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_HOST: ${LDAP_HOST:-authentik-ldap}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      COT_RETENTION_DAYS: ${COT_RETENTION_DAYS:-}
      GEOCHAT_RETENTION_DAYS: ${GEOCHAT_RETENTION_DAYS:-}
      RETENTION_CRON: ${RETENTION_CRON:-}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
      AUTHENTIK_PORT: ${AUTHENTIK_PORT:-9443}
      NODERED_PORT: ${NODERED_PORT:-1880}
      MONITOR_PORT: ${MONITOR_PORT:-8180}
      TAKSERVER_ADMIN_PORT: ${TAKSERVER_ADMIN_PORT:-8446}
      MEDIAMTX_PORT: ${MEDIAMTX_PORT:-8888}
    volumes:
      - *tak-mount

  # ── TAK Server (official tak.gov image) ────────────────────────────────
  tak-server:
    image: takserver:${TAK_VERSION}
    entrypoint: ["/start.sh"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      tak-database:
        condition: service_healthy
      init-config:
        condition: service_completed_successfully
      init-identity:
        condition: service_completed_successfully
      init-ldap-ready:
        condition: service_completed_successfully
    ports:
      - "8443:8443"   # Cert enrollment HTTPS
      - "8089:8089"   # Streaming CoT
    volumes:
      - *tak-mount
      - ./tak-server/start.sh:/start.sh:ro
      - ./tak-server/healthcheck.sh:/opt/tak/healthcheck.sh:ro
      - ./tak-server/register-api-cert.sh:/opt/tak/register-api-cert.sh:ro
    healthcheck:
      test: ["CMD", "/opt/tak/healthcheck.sh"]
      interval: 60s
      retries: 3
      start_period: 240s

  # ── App Database (PostgreSQL — shared by Authentik + Node-RED) ─────────
  app-db:
    image: postgis/postgis:15-3.4-alpine
    restart: unless-stopped
    logging: *default-logging
    entrypoint: ["/start.sh"]
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: fastak
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./app-db/start.sh:/start.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fastak", "-d", "authentik"]
      interval: 10s
      retries: 5
      start_period: 10s

  # ── Connection Pooler (PgBouncer) ──────────────────────────────────────
  # Authentik's worker opens hundreds of DB connections during startup,
  # easily exceeding PostgreSQL's max_connections. PgBouncer multiplexes
  # the server's connections down to a fixed pool. The worker bypasses
  # PgBouncer because migrations use advisory locks that don't work in
  # transaction-pool mode. See issue #31 for details.
  pgbouncer:
    image: edoburu/pgbouncer@sha256:85d1e38593617af1b5f7f285e97d407e56c29939683cc7cfe4c8f6dc19f1268b
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://fastak:${APP_DB_PASSWORD}@app-db:5432/authentik
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "20"
      MAX_CLIENT_CONN: "500"
      MIN_POOL_SIZE: "5"
      LISTEN_PORT: "5432"
      SERVER_TLS_SSLMODE: disable
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ── Identity (Authentik SSO, LDAP, TAK Portal) ────────────────────────
  # Start order: redis → authentik-server/worker → init-identity → authentik-ldap → tak-portal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION}
    command: server
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *authentik-env
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 15s
      start_period: 120s
      retries: 5

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_VERSION}
    command: worker
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Worker connects directly to app-db — advisory locks used during
    # migrations don't work through PgBouncer's transaction pooling.
    environment:
      <<: *authentik-env
      AUTHENTIK_POSTGRESQL__HOST: app-db
      AUTHENTIK_POSTGRESQL__DISABLE_SERVER_SIDE_CURSORS: "false"

  init-identity:
    build: ./init-identity
    restart: "no"
    logging: *default-logging
    depends_on:
      init-config:
        condition: service_completed_successfully
      authentik-server:
        condition: service_healthy
    environment:
      AUTHENTIK_URL: http://authentik-server:9000
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      TAK_WEBADMIN_PASSWORD: ${TAK_WEBADMIN_PASSWORD}
      LDAP_HOST: authentik-ldap
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      TAKPORTAL_SUBDOMAIN: ${TAKPORTAL_SUBDOMAIN:-portal}
      AUTHENTIK_SUBDOMAIN: ${AUTHENTIK_SUBDOMAIN:-auth}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
      AUTHENTIK_PORT: ${AUTHENTIK_PORT:-9443}
      MONITOR_PORT: ${MONITOR_PORT:-8180}
      NODERED_PORT: ${NODERED_PORT:-1880}
      MONITOR_SUBDOMAIN: ${MONITOR_SUBDOMAIN:-monitor}
      NODERED_SUBDOMAIN: ${NODERED_SUBDOMAIN:-nodered}
    volumes:
      - *tak-mount

  authentik-ldap:
    image: ghcr.io/goauthentik/ldap:${AUTHENTIK_VERSION}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      init-identity:
        condition: service_completed_successfully
    environment:
      AUTHENTIK_HOST: http://authentik-server:9000
      AUTHENTIK_TOKEN: ${AUTHENTIK_API_TOKEN}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q",
             "http://localhost:9300/outpost.goauthentik.io/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # ports:
    #   - "389:3389"  # Uncomment for external LDAP clients (TAK Server uses Docker DNS internally)

  # This is some hacky shit to fix TAK Server's inability to respect LDAP-only
  # authentication. TAK Server always enables its FileAuthenticator on start even
  # if removed from CoreConfig prior to start.
  # If a client connects before LDAP is serving queries, the FileAuthenticator registers the
  # user with __ANON__ groups, creating authentication and group issues.
  # The authentik-ldap healthcheck (HTTP ping on :9300) passes before LDAP on :3389 is actually ready,
  # so we need this init container to perform a real LDAP bind before TAK Server starts.
  init-ldap-ready:
    build: ./init-ldap-ready
    restart: "no"
    logging: *default-logging
    depends_on:
      authentik-ldap:
        condition: service_healthy
    environment:
      LDAP_HOST: ${LDAP_HOST:-authentik-ldap}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}

  tak-portal:
    build: https://github.com/AdventureSeeker423/TAK-Portal.git#${TAK_PORTAL_VERSION:-main}
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      retries: 3
      start_period: 30s
    depends_on:
      init-identity:
        condition: service_completed_successfully
    volumes:
      - *tak-mount
      - ./tak-portal/start.sh:/usr/src/app/start.sh:ro
    environment:
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
    entrypoint: ["/bin/sh", "/usr/src/app/start.sh"]

  # ── Networking (reverse proxy + SSL) ───────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      init-config:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${TAK_HOST_PATH:-./tak}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data

  # ── Streaming (video ingress + playback) ───────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:${MEDIAMTX_VERSION}
    restart: unless-stopped
    logging: *default-logging
    # No healthcheck — scratch-based image has no shell/tools.
    # Monitor checks via Docker API container status instead.
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP

  # ── Automation ─────────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:${NODERED_VERSION}
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1880/"]
      interval: 30s
      retries: 3
      start_period: 30s
    depends_on:
      init-config:
        condition: service_completed_successfully
      app-db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/fastak/start.sh"]
    environment:
      DB_HOST: app-db
      DB_PORT: "5432"
      DB_NAME: nodered
      DB_USER: fastak
      DB_PASSWORD: ${APP_DB_PASSWORD}
      TAK_HOST: tak-server
      TAK_PORT: "8089"
      SERVER_ADDRESS: ${SERVER_ADDRESS}
    volumes:
      - nodered-data:/data
      - ./nodered/flows.json:/opt/fastak/flows.json:ro
      - ./nodered/start.sh:/opt/fastak/start.sh:ro
      - ${TAK_HOST_PATH:-./tak}/certs/files/svc_nodered.p12:/opt/tak/certs/svc_nodered.p12:ro
      - ${TAK_HOST_PATH:-./tak}/certs/files/ca.pem:/opt/tak/certs/ca.pem:ro

  # ── Monitor (health API + operations dashboard) ────────────────────────
  monitor:
    build: ./monitor
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      tak-server:
        condition: service_healthy
    environment:
      TAK_VERSION: ${TAK_VERSION}
      TAK_DB_PASSWORD: ${TAK_DB_PASSWORD}
      TAK_DB_URL: ${TAK_DB_URL:-}
      AUTHENTIK_VERSION: ${AUTHENTIK_VERSION}
      MEDIAMTX_VERSION: ${MEDIAMTX_VERSION}
      NODERED_VERSION: ${NODERED_VERSION}
      TAK_PORTAL_VERSION: ${TAK_PORTAL_VERSION}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      TAKSERVER_SUBDOMAIN: ${TAKSERVER_SUBDOMAIN}
      MEDIAMTX_SUBDOMAIN: ${MEDIAMTX_SUBDOMAIN}
      AUTHENTIK_SUBDOMAIN: ${AUTHENTIK_SUBDOMAIN}
      TAKPORTAL_SUBDOMAIN: ${TAKPORTAL_SUBDOMAIN}
      NODERED_SUBDOMAIN: ${NODERED_SUBDOMAIN}
      MONITOR_SUBDOMAIN: ${MONITOR_SUBDOMAIN:-monitor}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
      AUTHENTIK_PORT: ${AUTHENTIK_PORT:-9443}
      NODERED_PORT: ${NODERED_PORT:-1880}
      MONITOR_PORT: ${MONITOR_PORT:-8180}
      TAKSERVER_ADMIN_PORT: ${TAKSERVER_ADMIN_PORT:-8446}
      MEDIAMTX_PORT: ${MEDIAMTX_PORT:-8888}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_FROM: ${SMS_FROM:-}
      SMS_TO: ${SMS_TO:-}
      # User management API (DD-025)
      AUTHENTIK_URL: http://authentik-server:9000
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN}
      TAK_SERVER_URL: https://tak-server:8443
      TAK_API_CERT_PATH: /opt/tak/certs/files/svc_fasttakapi.p12
      TAK_API_CERT_PASSWORD: atakatak
      USERS_HIDDEN_PREFIXES: ${USERS_HIDDEN_PREFIXES:-ak-,adm_,svc_,ma-}
      USER_EXPIRY_CHECK_INTERVAL: ${USER_EXPIRY_CHECK_INTERVAL:-60}
      ENROLLMENT_TTL_MINUTES: ${ENROLLMENT_TTL_MINUTES:-15}
      TAK_ENROLLMENT_PORT: ${TAK_ENROLLMENT_PORT:-8446}
      AUTOVACUUM_MIN_DEAD_TUPLES: ${AUTOVACUUM_MIN_DEAD_TUPLES:-1000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${TAK_HOST_PATH:-./tak}/certs:/opt/tak/certs:ro
      - .:/opt/fastak:ro  # For .env change detection (directory mount survives file rewrites)
