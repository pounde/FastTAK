# =============================================================================
# FastTAK — Docker Compose Stack
# =============================================================================
# All services start together. No profiles needed.
#   ./start.sh              # or: docker compose up -d --build
#
# Prerequisites:
#   1. Run ./setup.sh <takserver-docker-X.X.zip> to extract tak/ and build images
#   2. cp .env.example .env && vim .env
# =============================================================================

# ---------------------------------------------------------------------------
# Shared fragments (YAML anchors)
# ---------------------------------------------------------------------------
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

# TAK host path — defaults to ./tak. Override with TAK_HOST_PATH env var to:
#   - Run integration tests against an isolated copy (avoids collisions with running stack)
#   - Test against different TAK Server versions (e.g., TAK_HOST_PATH=./tak-5.7)
# Any new bind mounts referencing TAK files should use ${TAK_HOST_PATH:-./tak} as the
# base path, not ./tak directly, so the override works consistently.
x-tak-mount: &tak-mount ${TAK_HOST_PATH:-./tak}:/opt/tak

# =============================================================================
# Volumes
# =============================================================================
volumes:
  tak-db-data:
  app-db-data:
  nodered-data:
  caddy-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  default:

# =============================================================================
# Services
# =============================================================================
services:

  # ── TAK Database (official tak.gov image — PostgreSQL 15 + PostGIS) ──────
  tak-database:
    image: takserver-database:${TAK_VERSION}
    entrypoint: ["/start.sh"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      TAK_DB_PASSWORD: ${TAK_DB_PASSWORD}
      PG_AUTOVACUUM_SCALE_FACTOR: ${PG_AUTOVACUUM_SCALE_FACTOR:-}
      PG_AUTOVACUUM_COST_LIMIT: ${PG_AUTOVACUUM_COST_LIMIT:-}
      PG_MAINTENANCE_WORK_MEM: ${PG_MAINTENANCE_WORK_MEM:-}
    volumes:
      - tak-db-data:/var/lib/postgresql/data
      - *tak-mount
      - ./tak-database/start.sh:/start.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "martiuser", "-d", "cot"]
      interval: 10s
      retries: 5
      start_period: 30s

  # ── Init: config (one-shot config patching) ────────────────────────────
  init-config:
    build: ./init-config
    restart: "no"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      tak-database:
        condition: service_healthy
    environment:
      TAK_DB_PASSWORD: ${TAK_DB_PASSWORD}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_HOST: ${LDAP_HOST:-ldap-proxy}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      COT_RETENTION_DAYS: ${COT_RETENTION_DAYS:-}
      GEOCHAT_RETENTION_DAYS: ${GEOCHAT_RETENTION_DAYS:-}
      RETENTION_CRON: ${RETENTION_CRON:-}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
      NODERED_PORT: ${NODERED_PORT:-1880}
      MONITOR_PORT: ${MONITOR_PORT:-8180}
      TAKSERVER_ADMIN_PORT: ${TAKSERVER_ADMIN_PORT:-8446}
      MEDIAMTX_PORT: ${MEDIAMTX_PORT:-8888}
    volumes:
      - *tak-mount

  # ── TAK Server (official tak.gov image) ────────────────────────────────
  tak-server:
    image: takserver:${TAK_VERSION}
    entrypoint: ["/start.sh"]
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 4G
    depends_on:
      tak-database:
        condition: service_healthy
      init-config:
        condition: service_completed_successfully
      init-identity:
        condition: service_completed_successfully
      init-ldap-ready:
        condition: service_completed_successfully
    ports:
      - "8443:8443"   # HTTPS
      - "8446:8446"   # Cert enrollment / admin API (mTLS); URL target for enrollment QRs
      - "8089:8089"   # Streaming CoT (mTLS)
    volumes:
      - *tak-mount
      - ./tak-server/start.sh:/start.sh:ro
      - ./tak-server/healthcheck.sh:/opt/tak/healthcheck.sh:ro
      - ./tak-server/register-api-cert.sh:/opt/tak/register-api-cert.sh:ro
    healthcheck:
      test: ["CMD", "/opt/tak/healthcheck.sh"]
      interval: 60s
      retries: 3
      start_period: 240s

  # ── App Database (PostgreSQL — shared by LLDAP + Node-RED) ─────────────
  app-db:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
    entrypoint: ["/start.sh"]
    environment:
      POSTGRES_DB: lldap
      POSTGRES_USER: fastak
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
    volumes:
      - app-db-data:/var/lib/postgresql/data
      - ./app-db/start.sh:/start.sh:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "fastak"]
      interval: 10s
      retries: 5
      start_period: 10s

  # ── Identity (LLDAP, LDAP Proxy, TAK Portal) ──────────────────────────
  # Start order: app-db → lldap → ldap-proxy → init-identity → tak-portal

  lldap:
    image: lldap/lldap:${LLDAP_VERSION}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      app-db:
        condition: service_healthy
    environment:
      LLDAP_LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      LLDAP_LDAP_USER_DN: adm_ldapservice
      LLDAP_LDAP_USER_PASS: ${LDAP_BIND_PASSWORD}
      LLDAP_DATABASE_URL: postgres://fastak:${APP_DB_PASSWORD}@app-db:5432/lldap
      LLDAP_LDAP_PORT: 3890
      LLDAP_HTTP_PORT: 17170
    healthcheck:
      test: ["CMD", "/app/lldap", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  ldap-proxy:
    build: ./ldap-proxy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      lldap:
        condition: service_healthy
    environment:
      LLDAP_ADDR: lldap:3890
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      TOKEN_DB_PATH: /tmp/tokens.db
      ENROLLMENT_TOKEN_TTL_MINUTES: ${ENROLLMENT_TOKEN_TTL_MINUTES:-15}
      ENROLLMENT_TOKEN_ONE_TIME: ${ENROLLMENT_TOKEN_ONE_TIME:-false}
      LDAP_RATE_LIMIT_WINDOW: ${LDAP_RATE_LIMIT_WINDOW:-5m}
      LDAP_RATE_LIMIT_MAX_ATTEMPTS: ${LDAP_RATE_LIMIT_MAX_ATTEMPTS:-10}
      LDAP_RATE_LIMIT_LOCKOUT: ${LDAP_RATE_LIMIT_LOCKOUT:-15m}
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 3s

  init-identity:
    build:
      context: ./init-identity
      args:
        LLDAP_VERSION: ${LLDAP_VERSION}
    restart: "no"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      init-config:
        condition: service_completed_successfully
      lldap:
        condition: service_healthy
    environment:
      LLDAP_URL: http://lldap:17170
      LLDAP_ADMIN_USER: adm_ldapservice
      LDAP_ADMIN_PASSWORD: ${LDAP_BIND_PASSWORD}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}
      TAK_WEBADMIN_PASSWORD: ${TAK_WEBADMIN_PASSWORD}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
    volumes:
      - *tak-mount

  # This is some hacky shit to fix TAK Server's inability to respect LDAP-only
  # authentication. TAK Server always enables its FileAuthenticator on start even
  # if removed from CoreConfig prior to start.
  # If a client connects before LDAP is serving queries, the FileAuthenticator registers the
  # user with __ANON__ groups, creating authentication and group issues.
  # The LDAP healthcheck may pass before queries are actually ready,
  # so we need this init container to perform a real LDAP bind before TAK Server starts.
  init-ldap-ready:
    build: ./init-ldap-ready
    restart: "no"
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
    depends_on:
      ldap-proxy:
        condition: service_healthy
    environment:
      LDAP_HOST: ${LDAP_HOST:-ldap-proxy}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-DC=takldap}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD}

  tak-portal:
    build: https://github.com/AdventureSeeker423/TAK-Portal.git#${TAK_PORTAL_VERSION:-main}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000',r=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      retries: 3
      start_period: 30s
    depends_on:
      init-identity:
        condition: service_completed_successfully
    volumes:
      - *tak-mount
      - ./tak-portal/start.sh:/usr/src/app/start.sh:ro
    environment:
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
    entrypoint: ["/bin/sh", "/usr/src/app/start.sh"]

  # ── Networking (reverse proxy + SSL) ───────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      init-config:
        condition: service_completed_successfully
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${TAK_HOST_PATH:-./tak}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data

  # ── Streaming (video ingress + playback) ───────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:${MEDIAMTX_VERSION}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    # No healthcheck — scratch-based image has no shell/tools.
    # Monitor checks via Docker API container status instead.
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP

  # ── Automation ─────────────────────────────────────────────────────────
  nodered:
    image: nodered/node-red:${NODERED_VERSION}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:1880/"]
      interval: 30s
      retries: 3
      start_period: 30s
    depends_on:
      init-config:
        condition: service_completed_successfully
      app-db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/opt/fastak/start.sh"]
    environment:
      DB_HOST: app-db
      DB_PORT: "5432"
      DB_NAME: nodered
      DB_USER: fastak
      DB_PASSWORD: ${APP_DB_PASSWORD}
      TAK_HOST: tak-server
      TAK_PORT: "8089"
      SERVER_ADDRESS: ${SERVER_ADDRESS}
    volumes:
      - nodered-data:/data
      - ./nodered/flows.json:/opt/fastak/flows.json:ro
      - ./nodered/start.sh:/opt/fastak/start.sh:ro
      # Shipped library flows mount directly under Node-RED's library
      # path so they appear under Import → Local → fasttak in the editor.
      # User-saved library entries land elsewhere under /data/lib/flows/
      # and are unaffected. Bind-mounted (not symlinked) so Node-RED's
      # library scanner sees a real directory, not a symlink — avoids
      # path-traversal rejection in some Node-RED versions.
      - ./nodered/flows-library:/data/lib/flows/fasttak:ro
      # Node-RED-consumable PEMs written by the monitor on data-mode service
      # account creation. Scoped subdirectory — CA key, TAK Server cert, and
      # encrypted private keys stay outside this mount.
      - ${TAK_HOST_PATH:-./tak}/certs/files/nodered:/data/certs:ro
      - ${TAK_HOST_PATH:-./tak}/certs/files/ca.pem:/opt/tak/certs/ca.pem:ro

  # ── Monitor (health API + operations dashboard) ────────────────────────
  monitor:
    build:
      context: ./monitor
      args:
        LLDAP_VERSION: ${LLDAP_VERSION}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      tak-server:
        condition: service_healthy
    environment:
      TAK_VERSION: ${TAK_VERSION}
      TAK_DB_PASSWORD: ${TAK_DB_PASSWORD}
      TAK_DB_URL: ${TAK_DB_URL:-}
      FASTAK_DB_PASSWORD: ${FASTAK_DB_PASSWORD:-${APP_DB_PASSWORD}}
      APP_DB_HOST: ${APP_DB_HOST:-app-db}
      LLDAP_VERSION: ${LLDAP_VERSION}
      MEDIAMTX_VERSION: ${MEDIAMTX_VERSION}
      NODERED_VERSION: ${NODERED_VERSION}
      TAK_PORTAL_VERSION: ${TAK_PORTAL_VERSION}
      SERVER_ADDRESS: ${SERVER_ADDRESS}
      TAKSERVER_SUBDOMAIN: ${TAKSERVER_SUBDOMAIN}
      MEDIAMTX_SUBDOMAIN: ${MEDIAMTX_SUBDOMAIN}
      TAKPORTAL_SUBDOMAIN: ${TAKPORTAL_SUBDOMAIN}
      NODERED_SUBDOMAIN: ${NODERED_SUBDOMAIN}
      MONITOR_SUBDOMAIN: ${MONITOR_SUBDOMAIN:-monitor}
      DEPLOY_MODE: ${DEPLOY_MODE:-subdomain}
      NODERED_PORT: ${NODERED_PORT:-1880}
      MONITOR_PORT: ${MONITOR_PORT:-8180}
      TAKSERVER_ADMIN_PORT: ${TAKSERVER_ADMIN_PORT:-8446}
      MEDIAMTX_PORT: ${MEDIAMTX_PORT:-8888}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL: ${ALERT_EMAIL:-}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMS_FROM: ${SMS_FROM:-}
      SMS_TO: ${SMS_TO:-}
      # User management API (DD-025)
      LLDAP_URL: http://lldap:17170
      LDAP_PROXY_URL: http://ldap-proxy:8080
      LDAP_ADMIN_PASSWORD: ${LDAP_BIND_PASSWORD}
      TAK_SERVER_URL: https://tak-server:8443
      TAK_API_CERT_PATH: /opt/tak/certs/files/svc_fasttakapi.p12
      TAK_API_CERT_PASSWORD: atakatak
      USERS_HIDDEN_PREFIXES: ${USERS_HIDDEN_PREFIXES:-adm_,svc_,ma-}
      USER_EXPIRY_CHECK_INTERVAL: ${USER_EXPIRY_CHECK_INTERVAL:-60}
      ENROLLMENT_TOKEN_TTL_MINUTES: ${ENROLLMENT_TOKEN_TTL_MINUTES:-15}
      ENROLLMENT_TOKEN_ONE_TIME: ${ENROLLMENT_TOKEN_ONE_TIME:-false}
      TAK_ENROLLMENT_PORT: ${TAK_ENROLLMENT_PORT:-8446}
      LKP_COT_TYPE_PREFIXES: ${LKP_COT_TYPE_PREFIXES:-a-}
      AUTOVACUUM_MIN_DEAD_TUPLES: ${AUTOVACUUM_MIN_DEAD_TUPLES:-1000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${TAK_HOST_PATH:-./tak}/certs:/opt/tak/certs:ro
      - .:/opt/fastak:ro  # For .env change detection (directory mount survives file rewrites)
