{% extends "base.html" %}

{% block content %}
<h1>Service Accounts</h1>

<div x-data="{
    selectedAccount: null,
    showCreate: false,
    newName: '',
    newDisplayName: '',
    newMode: 'data',
    selectedGroups: [],
    availableGroups: [],
    groupDropdownOpen: false,
    newValidity: '',
    createLoading: false,
    createError: '',
    actionLoading: false,
    actionResult: '',
    actionError: false,

    async init() {
        await this.fetchGroups();
    },

    async fetchGroups() {
        try {
            const r = await fetch('/api/groups');
            if (r.ok) this.availableGroups = await r.json();
        } catch(e) { /* groups will be empty */ }
    },

    toggleGroup(name) {
        const idx = this.selectedGroups.indexOf(name);
        if (idx === -1) this.selectedGroups.push(name);
        else this.selectedGroups.splice(idx, 1);
    },

    refreshList() {
        htmx.ajax('GET', '/ui/partials/service-account-list', '#svc-list-container');
    },

    async createAccount() {
        if (!this.newName || !this.newDisplayName) return;
        this.createLoading = true;
        this.createError = '';
        try {
            const body = {
                name: this.newName,
                display_name: this.newDisplayName,
                mode: this.newMode,
            };
            if (this.newMode === 'data') {
                if (this.selectedGroups.length === 0) {
                    this.createError = 'Data mode requires at least one group';
                    this.createLoading = false;
                    return;
                }
                body.groups = [...this.selectedGroups];
            }
            if (this.newValidity) body.validity_days = parseInt(this.newValidity);
            const r = await fetch('/api/service-accounts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (!r.ok) {
                const d = await r.json();
                this.createError = d.detail || 'Failed to create service account';
                return;
            }
            this.newName = ''; this.newDisplayName = ''; this.selectedGroups = []; this.newValidity = '';
            this.showCreate = false;
            this.refreshList();
        } catch(e) { this.createError = e.message; }
        finally { this.createLoading = false; }
    },

    async deactivateAccount() {
        if (!this.selectedAccount) return;
        if (!confirm('Deactivate ' + this.selectedAccount.username + '? This will revoke all certificates.')) return;
        this.actionLoading = true; this.actionResult = ''; this.actionError = false;
        try {
            const r = await fetch('/api/service-accounts/' + this.selectedAccount.id, { method: 'DELETE' });
            if (!r.ok) { const d = await r.json(); this.actionResult = d.detail || 'Failed'; this.actionError = true; return; }
            this.actionResult = 'Deactivated + certs revoked';
            this.selectedAccount = null;
            this.refreshList();
        } catch(e) { this.actionResult = e.message; this.actionError = true; }
        finally { this.actionLoading = false; }
    },

    editName: '',
    editGroups: [],
    editGroupDropdownOpen: false,

    toggleEditGroup(name) {
        const idx = this.editGroups.indexOf(name);
        if (idx === -1) this.editGroups.push(name);
        else this.editGroups.splice(idx, 1);
    },

    async saveEdit() {
        if (!this.selectedAccount) return;
        this.actionLoading = true; this.actionResult = ''; this.actionError = false;
        try {
            const body = {};
            if (this.editName && this.editName !== this.selectedAccount.name) {
                body.display_name = this.editName;
            }
            if (JSON.stringify([...this.editGroups].sort()) !== JSON.stringify([...(this.selectedAccount.groups || [])].sort())) {
                body.groups = [...this.editGroups];
            }
            if (Object.keys(body).length === 0) {
                this.actionResult = 'No changes';
                return;
            }
            const r = await fetch('/api/service-accounts/' + this.selectedAccount.id, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (!r.ok) {
                const d = await r.json();
                this.actionResult = d.detail || 'Update failed';
                this.actionError = true;
                return;
            }
            this.actionResult = 'Updated';
            this.refreshList();
        } catch(e) { this.actionResult = e.message; this.actionError = true; }
        finally { this.actionLoading = false; }
    },

    takServerCerts: [],

    async loadCerts() {
        if (!this.selectedAccount) return;
        try {
            const r = await fetch('/api/service-accounts/' + this.selectedAccount.id);
            if (r.ok) {
                const d = await r.json();
                this.takServerCerts = d.certs || [];
            }
        } catch(e) { /* ignore */ }
    },

    async revokeCert(cert) {
        if (!this.selectedAccount) return;
        const label = cert.name || '#' + cert.cert_id;
        if (!confirm('Revoke certificate ' + label + '? The service will be disconnected immediately. This cannot be undone.')) return;
        this.actionLoading = true; this.actionResult = ''; this.actionError = false;
        try {
            const body = cert.cert_id ? {cert_id: cert.cert_id} : {cert_name: cert.name};
            const r = await fetch('/api/users/' + this.selectedAccount.id + '/certs/revoke', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (!r.ok) { const d = await r.json(); this.actionResult = d.detail || 'Revoke failed'; this.actionError = true; return; }
            this.actionResult = 'Certificate revoked';
            await this.loadCerts();
        } catch(e) { this.actionResult = e.message; this.actionError = true; }
        finally { this.actionLoading = false; }
    },

    selectAccount(account) {
        if (this.selectedAccount?.id === account.id) {
            this.selectedAccount = null;
        } else {
            this.selectedAccount = account;
            this.editName = account.name;
            this.editGroups = [...(account.groups || [])];
            this.editGroupDropdownOpen = false;
            this.actionResult = '';
            this.actionError = false;
            this.takServerCerts = [];
            this.loadCerts();
        }
    }
}">

    <!-- Create toggle -->
    <div class="flex mb-16" style="justify-content: flex-end;">
        <button @click="showCreate = !showCreate; createError = ''">
            <span x-text="showCreate ? 'Cancel' : 'New Service Account'"></span>
        </button>
    </div>

    <!-- Create form -->
    <div class="card" x-show="showCreate" x-cloak style="margin-bottom: 16px;">
        <div class="card-title">Create Service Account</div>
        <div class="flex mb-8" style="flex-wrap: wrap; gap: 12px;">
            <div>
                <label style="color: #888; font-size: 12px; display: block; margin-bottom: 4px;">Name (svc_ auto-prepended)</label>
                <input type="text" x-model="newName" placeholder="uas-unit7" @keyup.enter="createAccount()">
            </div>
            <div>
                <label style="color: #888; font-size: 12px; display: block; margin-bottom: 4px;">Display Name</label>
                <input type="text" x-model="newDisplayName" placeholder="UAS Unit 7" @keyup.enter="createAccount()">
            </div>
            <div>
                <label style="color: #888; font-size: 12px; display: block; margin-bottom: 4px;">Mode</label>
                <select x-model="newMode">
                    <option value="data">Data (sends/receives CoT)</option>
                    <option value="admin">Admin (management API)</option>
                </select>
            </div>
            <div x-show="newMode === 'data'" style="position: relative;">
                <label style="color: #888; font-size: 12px; display: block; margin-bottom: 4px;">Groups</label>
                <button type="button" @click="groupDropdownOpen = !groupDropdownOpen"
                        style="min-width: 180px; text-align: left; position: relative; padding-right: 24px;">
                    <span x-text="selectedGroups.length ? selectedGroups.join(', ') : 'Select groups...'"
                          :style="selectedGroups.length ? '' : 'color: #555'"></span>
                    <span style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #555;">&#9662;</span>
                </button>
                <div x-show="groupDropdownOpen" x-cloak @click.outside="groupDropdownOpen = false"
                     style="position: absolute; top: 100%; left: 0; z-index: 20; background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 4px; max-height: 200px; overflow-y: auto; min-width: 180px; margin-top: 4px;">
                    <template x-if="availableGroups.length === 0">
                        <p style="padding: 8px 12px; color: #555; font-size: 12px; margin: 0;">No groups available</p>
                    </template>
                    <template x-for="g in availableGroups" :key="g.name">
                        <label style="display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;"
                               @click.stop>
                            <input type="checkbox"
                                   :checked="selectedGroups.includes(g.name)"
                                   @change="toggleGroup(g.name)"
                                   style="accent-color: #4fc3f7;">
                            <span x-text="g.name"></span>
                        </label>
                    </template>
                </div>
            </div>
            <div>
                <label style="color: #888; font-size: 12px; display: block; margin-bottom: 4px;">Cert validity (days)</label>
                <input type="text" x-model="newValidity" :placeholder="newMode === 'data' ? '365' : '730'" style="width: 80px;">
            </div>
            <div style="align-self: flex-end;">
                <button :disabled="!newName || !newDisplayName || createLoading" @click="createAccount()">
                    <span x-text="createLoading ? 'Creating...' : 'Create'"></span>
                </button>
            </div>
        </div>
        <p x-show="createError" x-text="createError" class="text-red" style="font-size: 12px;"></p>
    </div>

    <!-- Service account list -->
    <div class="card">
        <div class="card-title">Service Accounts</div>
        <div id="svc-list-container"
             hx-get="/ui/partials/service-account-list"
             hx-trigger="load"
             hx-swap="innerHTML">
            <span class="text-muted">Loading...</span>
        </div>
    </div>

    <!-- Detail panel -->
    <div class="card" x-show="selectedAccount" x-cloak style="margin-top: 16px;">
        <div class="card-title">
            <span x-text="selectedAccount?.username"></span>
            <span style="float: right; cursor: pointer; color: #555;" @click="selectedAccount = null">close</span>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">

            <!-- Edit section -->
            <div>
                <h2>Edit</h2>
                <div class="flex mb-8">
                    <label style="color: #888; font-size: 12px; min-width: 50px;">Name</label>
                    <input type="text" x-model="editName" placeholder="Display Name" style="flex: 1;">
                </div>

                <!-- Group editor (checkbox dropdown) -->
                <div class="mb-8" style="position: relative;">
                    <label style="color: #888; font-size: 12px; display: block; margin-bottom: 4px;">Groups</label>
                    <button type="button" @click="editGroupDropdownOpen = !editGroupDropdownOpen"
                            style="min-width: 180px; text-align: left; position: relative; padding-right: 24px; width: 100%;">
                        <span x-text="editGroups.length ? editGroups.join(', ') : 'No groups'"
                              :style="editGroups.length ? '' : 'color: #555'"></span>
                        <span style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #555;">&#9662;</span>
                    </button>
                    <div x-show="editGroupDropdownOpen" x-cloak @click.outside="editGroupDropdownOpen = false"
                         style="position: absolute; top: 100%; left: 0; z-index: 20; background: #1a1a1a; border: 1px solid #3a3a3a; border-radius: 4px; max-height: 200px; overflow-y: auto; min-width: 180px; margin-top: 4px; width: 100%;">
                        <template x-if="availableGroups.length === 0">
                            <p style="padding: 8px 12px; color: #555; font-size: 12px; margin: 0;">No groups available</p>
                        </template>
                        <template x-for="g in availableGroups" :key="g.name">
                            <label style="display: flex; align-items: center; gap: 8px; padding: 6px 12px; cursor: pointer; font-size: 13px;"
                                   @click.stop>
                                <input type="checkbox"
                                       :checked="editGroups.includes(g.name)"
                                       @change="toggleEditGroup(g.name)"
                                       style="accent-color: #4fc3f7;">
                                <span x-text="g.name"></span>
                            </label>
                        </template>
                    </div>
                </div>

                <button :disabled="actionLoading" @click="saveEdit()">
                    <span x-text="actionLoading ? '...' : 'Save'"></span>
                </button>
            </div>

            <!-- Certificate & Actions -->
            <div>
                <h2>Certificates</h2>
                <div class="flex mb-8" style="gap: 12px; flex-wrap: wrap;">
                    <a :href="'/api/service-accounts/' + selectedAccount?.id + '/certs/download'"
                       class="btn" style="text-decoration: none;"
                       x-show="selectedAccount?.is_active">Download .p12</a>
                </div>
                <p class="text-muted" style="font-size: 11px; margin-bottom: 8px;">Password: atakatak</p>

                <!-- TAK Server certs with revoke -->
                <template x-if="takServerCerts.length > 0">
                    <div>
                        <p class="text-muted" style="font-size: 11px; margin-bottom: 4px;">TAK Server certificates:</p>
                        <template x-for="c in takServerCerts" :key="c.id">
                            <div class="flex" style="margin-bottom: 4px; gap: 8px; align-items: center;">
                                <span style="font-size: 12px;"
                                      :class="c.revocation_date ? 'text-red' : 'text-green'"
                                      x-text="'#' + c.id"></span>
                                <span class="text-muted" style="font-size: 11px;"
                                      x-text="c.expiration_date ? 'expires ' + c.expiration_date : ''"></span>
                                <span x-show="c.revocation_date" class="badge badge-red" style="font-size: 10px;">revoked</span>
                                <a href="#" x-show="!c.revocation_date"
                                   style="color: #ef5350; font-size: 11px;"
                                   @click.prevent="revokeCert(c)">revoke</a>
                            </div>
                        </template>
                    </div>
                </template>

                <h2 style="margin-top: 16px;">Actions</h2>
                <button class="btn-danger" :disabled="actionLoading"
                        x-show="selectedAccount?.is_active"
                        @click="deactivateAccount()">
                    <span x-text="actionLoading ? '...' : 'Deactivate'"></span>
                </button>
            </div>

        </div>

        <p x-show="actionResult" x-text="actionResult" style="margin-top: 12px; font-size: 12px;"
           :class="actionError ? 'text-red' : 'text-green'"></p>
    </div>

</div>
{% endblock %}
