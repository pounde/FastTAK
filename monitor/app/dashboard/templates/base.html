<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastTAK Monitor</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
        }

        a { color: #4fc3f7; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Nav */
        nav {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 0;
        }

        nav .brand {
            color: #4fc3f7;
            font-weight: bold;
            font-size: 16px;
            padding: 12px 20px 12px 0;
            border-right: 1px solid #333;
            margin-right: 10px;
        }

        nav a.nav-link {
            color: #aaa;
            padding: 14px 16px;
            display: inline-block;
            border-bottom: 2px solid transparent;
        }

        nav a.nav-link:hover {
            color: #e0e0e0;
            text-decoration: none;
            border-bottom-color: #4fc3f7;
        }

        nav a.nav-link.active {
            color: #4fc3f7;
            border-bottom-color: #4fc3f7;
        }

        /* Service links */
        .service-links {
            background: #111;
            border-bottom: 1px solid #222;
            padding: 6px 20px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 12px;
        }

        .service-links span {
            color: #555;
        }

        .service-links a {
            color: #7c9cbf;
        }

        .service-links a:hover {
            color: #4fc3f7;
        }

        /* Main content */
        .container {
            padding: 20px;
            max-width: 1400px;
        }

        h1 {
            font-size: 18px;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 14px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        /* Cards */
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #2a2a2a;
        }

        /* Grid layout */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 16px;
        }

        .col-span-2 { grid-column: span 2; }
        .col-span-3 { grid-column: span 3; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            color: #666;
            font-weight: normal;
            padding: 4px 8px 8px 0;
            border-bottom: 1px solid #2a2a2a;
            font-size: 11px;
            text-transform: uppercase;
        }

        td {
            padding: 6px 8px 6px 0;
            border-bottom: 1px solid #1e1e1e;
            vertical-align: top;
        }

        tr:last-child td { border-bottom: none; }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-green  { background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; }
        .badge-yellow { background: #3a3a1a; color: #ffb74d; border: 1px solid #5a5a2d; }
        .badge-red    { background: #3a1a1a; color: #ef5350; border: 1px solid #5a2d2d; }
        .badge-gray   { background: #2a2a2a; color: #888;    border: 1px solid #3a3a3a; }

        /* Buttons */
        button, .btn {
            background: #252525;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        button:hover, .btn:hover {
            background: #2e2e2e;
            border-color: #4fc3f7;
        }

        button.btn-danger {
            border-color: #5a2d2d;
            color: #ef5350;
        }

        button.btn-danger:hover {
            background: #3a1a1a;
        }

        /* Inputs */
        input[type="text"], select {
            background: #111;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
            padding: 6px 10px;
            border-radius: 3px;
            font-family: inherit;
            font-size: 13px;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4fc3f7;
        }

        /* Pre / log output */
        pre {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            padding: 12px;
            border-radius: 3px;
            overflow-x: auto;
            font-size: 12px;
            color: #ccc;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
            color: #555;
            font-size: 12px;
            padding: 4px 0;
        }

        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator  { display: inline; }

        /* Tooltips */
        .help-tip {
            display: inline-block;
            position: relative;
            color: #555;
            cursor: help;
            margin-left: 6px;
            font-size: 12px;
        }

        .help-tip:hover { color: #4fc3f7; }

        .help-tip .tip-text {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #252525;
            border: 1px solid #3a3a3a;
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 12px;
            color: #ccc;
            white-space: normal;
            width: 280px;
            text-transform: none;
            letter-spacing: normal;
            font-weight: normal;
            line-height: 1.4;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .help-tip:hover .tip-text { display: block; }

        [x-cloak] { display: none; }

        /* Misc */
        .text-muted { color: #555; }
        .text-green { color: #4caf50; }
        .text-yellow { color: #ffb74d; }
        .text-red { color: #ef5350; }
        .mb-8 { margin-bottom: 8px; }
        .mb-16 { margin-bottom: 16px; }
        .flex { display: flex; gap: 8px; align-items: center; }
        .section { margin-bottom: 28px; }
        hr { border: none; border-top: 1px solid #2a2a2a; margin: 16px 0; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">FastTAK Monitor</span>
        <a href="/" class="nav-link{% if request.url.path == '/' %} active{% endif %}">Dashboard</a>
        <a href="/ops" class="nav-link{% if request.url.path == '/ops' %} active{% endif %}">Operations</a>
        <a href="/logs" class="nav-link{% if request.url.path == '/logs' %} active{% endif %}">Logs</a>
        <a href="/users" class="nav-link{% if request.url.path == '/users' %} active{% endif %}">Users</a>
    </nav>

    {% if service_links %}
    <div class="service-links">
        <span>Services:</span>
        {% for link in service_links %}
        <a href="{{ link.url }}" target="_blank">{{ link.name }}</a>
        {% endfor %}
        <a href="/api/docs" target="_blank">API Docs</a>
    </div>
    {% endif %}

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
